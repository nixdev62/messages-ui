<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Messages</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    :root { color-scheme: dark; }

    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overscroll-behavior: none;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    }

    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* LOADING SCREEN */
    #loadingScreen {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.6s ease;
    }
    #loadingText {
      margin-top: 18px;
      font-size: 15px;
      color: #a1a1a6;
      letter-spacing: 0.3px;
    }
    .spinner {
      width: 38px;
      height: 38px;
      border: 3px solid rgba(10,132,255,0.25);
      border-top-color: #0a84ff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* APP WRAPPER */
    #appWrapper {
      width: 100%;
      height: 100vh;
      display: none;
    }
    #loginView, #chatView {
      width: 100%;
      height: 100%;
    }

    /* LOGIN */
    #loginView {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    #loginCard {
      background: #111;
      padding: 28px 24px 24px;
      border-radius: 26px;
      width: 320px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.7);
      border: 1px solid #2c2c2e;
      animation: fadeIn 0.4s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #loginCard h1 {
      margin: 0 0 4px;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    #loginCard p {
      margin: 0 0 18px;
      font-size: 13px;
      color: #a1a1a6;
    }
    .fieldLabel {
      font-size: 12px;
      color: #a1a1a6;
      margin-bottom: 4px;
    }
    .fieldInput {
      width: 100%;
      padding: 10px 12px;
      border-radius: 11px;
      border: 1px solid #2c2c2e;
      background: #1c1c1e;
      color: #fff;
      margin-bottom: 12px;
      font-size: 14px;
      transition: border 0.15s ease;
    }
    .fieldInput:focus {
      outline: none;
      border-color: #0a84ff;
      box-shadow: 0 0 0 1px #0a84ff55;
    }
    .btnRow {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }
    .btn {
      flex: 1;
      padding: 9px 0;
      border-radius: 999px;
      border: none;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
      transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.12s ease;
    }
    .btnPrimary {
      background: #0a84ff;
      color: #fff;
      box-shadow: 0 8px 18px rgba(10,132,255,0.45);
    }
    .btnPrimary:active {
      transform: scale(0.97);
      box-shadow: 0 4px 10px rgba(10,132,255,0.4);
    }
    .btnSecondary {
      background: #2c2c2e;
      color: #fff;
    }
    .btnSecondary:active { transform: scale(0.97); }
    .errorText {
      color: #ff453a;
      font-size: 12px;
      margin-top: 6px;
      min-height: 14px;
    }

    /* CHAT LAYOUT */
    #chatView { display: none; }
    #chatShell {
      width: 100%;
      height: 100%;
      display: flex;
      background: #000;
    }

    /* SIDEBAR */
    #sidebar {
      width: 280px;
      background: #111;
      border-right: 1px solid #2c2c2e;
      display: flex;
      flex-direction: column;
      animation: slideIn 0.4s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    #sidebarHeader {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #2c2c2e;
    }
    #sidebarHeader h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }
    #sidebarHeader p {
      margin: 4px 0 0;
      font-size: 12px;
      color: #a1a1a6;
    }
    #newButtons {
      display: flex;
      gap: 6px;
      padding: 10px 12px 10px;
      border-bottom: 1px solid #2c2c2e;
    }
    .pillBtn {
      flex: 1;
      border-radius: 999px;
      border: none;
      padding: 6px 0;
      font-size: 12px;
      cursor: pointer;
      background: #1c1c1e;
      color: #fff;
      transition: background 0.12s ease, transform 0.08s ease;
    }
    .pillBtnPrimary { background: #0a84ff; }
    .pillBtn:active { transform: scale(0.97); }
    #convoList {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .convoItem {
      padding: 9px 11px;
      border-radius: 16px;
      margin-bottom: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      transition: background 0.12s ease, transform 0.08s ease;
    }
    .convoItem:hover { background: #1c1c1e; }
    .convoItem.active {
      background: #0a84ff;
      transform: translateY(-1px);
    }
    .convoText {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .convoTitle {
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .convoMeta {
      font-size: 11px;
      color: #d1d1d6;
    }
    .unreadDot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #ff453a;
      flex-shrink: 0;
      display: none;
    }
    .convoItem.unread .unreadDot { display: inline-block; }

    /* MAIN CHAT */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at top, #1c1c1e 0, #000 55%);
    }
    #chatHeader {
      padding: 10px 14px;
      border-bottom: 1px solid #2c2c2e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(24px);
      background: linear-gradient(135deg, #111111dd, #050505dd);
      box-shadow: 0 12px 30px rgba(0,0,0,0.6);
      animation: fadeIn 0.4s ease-out;
    }
    #chatHeaderLeft {
      display: flex;
      flex-direction: column;
    }
    #chatTitle {
      font-size: 16px;
      font-weight: 600;
    }
    #chatSubtitle {
      font-size: 12px;
      color: #a1a1a6;
    }
    #chatHeaderRight {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #userBadge {
      font-size: 12px;
      color: #a1a1a6;
      padding: 4px 10px;
      border-radius: 999px;
      background: #1c1c1e;
      border: 1px solid #2c2c2e;
    }
    #silentToggle {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #a1a1a6;
      padding: 3px 8px;
      border-radius: 999px;
      background: #1c1c1e;
      border: 1px solid #2c2c2e;
      cursor: pointer;
    }
    #silentDot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #0a84ff;
    }
    #silentToggle.silent #silentDot { background: #ff453a; }
    #deleteBtn {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      border: 1px solid #2c2c2e;
      background: #1c1c1e;
      color: #ff453a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      cursor: pointer;
    }

    /* MESSAGES */
    #messages {
      flex: 1;
      padding: 16px 10px 8px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
    }
    .bubbleRow {
      display: flex;
      width: 100%;
      animation: bubbleIn 0.18s cubic-bezier(.17,.67,.45,1.3);
    }
    @keyframes bubbleIn {
      from { transform: translateY(6px) scale(0.96); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }
    .bubble {
      max-width: 75%;
      padding: 8px 12px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.3;
      word-wrap: break-word;
      white-space: pre-wrap;
      box-shadow: 0 1px 2px rgba(0,0,0,0.4);
    }
    .meRow { justify-content: flex-end; }
    .meBubble {
      background: #0a84ff;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .themRow { justify-content: flex-start; }
    .themBubble {
      background: #3a3a3c;
      color: #fff;
      border-bottom-left-radius: 4px;
    }
    .bubbleMeta {
      font-size: 10px;
      color: #a1a1a6;
      margin-top: 2px;
      text-align: right;
    }
    .fileLink {
      color: #ffd60a;
      text-decoration: underline;
      cursor: pointer;
      font-size: 13px;
      display: inline-block;
      margin-top: 4px;
    }
    .imagePreview {
      max-width: 180px;
      max-height: 180px;
      border-radius: 12px;
      margin-top: 4px;
      display: block;
    }

    /* COMPOSER */
    #composer {
      padding: 8px 10px 12px;
      border-top: 1px solid #2c2c2e;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: #111;
    }
    #composerTop {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #fileInput { display: none; }
    #fileLabel {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      border: 1px solid #2c2c2e;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
      font-size: 18px;
      background: #1c1c1e;
      transition: background 0.12s ease, transform 0.08s ease;
    }
    #fileLabel:active { transform: scale(0.95); }
    #fileNameDisplay {
      font-size: 11px;
      color: #a1a1a6;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #composerBottom {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #msgInput {
      flex: 1;
      border-radius: 999px;
      border: none;
      padding: 10px 14px;
      font-size: 14px;
      background: #1c1c1e;
      color: #fff;
    }
    #msgInput:focus { outline: none; }
    #sendBtn {
      border-radius: 999px;
      border: none;
      padding: 8px 16px;
      font-size: 14px;
      background: #0a84ff;
      color: #fff;
      cursor: pointer;
      font-weight: 500;
      box-shadow: 0 8px 18px rgba(10,132,255,0.45);
      transition: transform 0.08s ease, box-shadow 0.08s ease;
    }
    #sendBtn:active {
      transform: scale(0.97);
      box-shadow: 0 4px 10px rgba(10,132,255,0.4);
    }
    #sendBtn:disabled {
      opacity: 0.5;
      cursor: default;
      box-shadow: none;
    }

    @media (max-width: 800px) {
      #sidebar { display: none; }
    }
  </style>
</head>
<body>
<div id="loadingScreen">
  <div class="spinner"></div>
  <div id="loadingText">Waking backend…</div>
</div>

<div id="appWrapper">
  <div id="loginView">
    <div id="loginCard">
      <h1>Messages</h1>
      <p>Sign up or log in to start texting.</p>
      <div class="fieldLabel">Username</div>
      <input id="username" class="fieldInput" placeholder="e.g. nix">
      <div class="fieldLabel">Password</div>
      <input id="password" class="fieldInput" type="password" placeholder="••••••••">
      <div class="btnRow">
        <button class="btn btnSecondary" onclick="signup()">Sign Up</button>
        <button class="btn btnPrimary" onclick="login()">Log In</button>
      </div>
      <div id="loginError" class="errorText"></div>
    </div>
  </div>

  <div id="chatView">
    <div id="chatShell">
      <div id="sidebar">
        <div id="sidebarHeader">
          <h2>Chats</h2>
          <p>DMs & groups</p>
        </div>
        <div id="newButtons">
          <button class="pillBtn pillBtnPrimary" onclick="promptDM()">New DM</button>
          <button class="pillBtn" onclick="promptGroup()">New Group</button>
        </div>
        <div id="convoList"></div>
      </div>

      <div id="main">
        <div id="chatHeader">
          <div id="chatHeaderLeft">
            <div id="chatTitle">No conversation</div>
            <div id="chatSubtitle">Select or create a chat</div>
          </div>
          <div id="chatHeaderRight">
            <div id="silentToggle" onclick="toggleSilent()">
              <div id="silentDot"></div>
              <span id="silentLabel">Sound On</span>
            </div>
            <div id="userBadge"></div>
            <button id="deleteBtn" onclick="deleteConversation()" title="Delete conversation">🗑</button>
          </div>
        </div>

        <div id="messages"></div>

        <div id="composer">
          <div id="composerTop">
            <label id="fileLabel" for="fileInput">+</label>
            <input id="fileInput" type="file" onchange="onFileChange(event)">
            <div id="fileNameDisplay">No file selected</div>
          </div>
          <div id="composerBottom">
            <input id="msgInput" placeholder="iMessage" onkeydown="if(event.key==='Enter'){event.preventDefault();sendMessage();}">
            <button id="sendBtn" onclick="sendMessage()">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<audio id="pingSound">
  <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAIlYAAESsAAACABAAZGF0YQAAAAAA" type="audio/wav">
</audio>

<script>
  const backend = "https://messages-use.onrender.com";
  let socket = null;
  let userId = null;
  let username = null;
  let currentConvo = null;
  let selectedFile = null;
  let silentMode = false;
  const unreadMap = {};
  const pingSound = document.getElementById("pingSound");

  function playPing() {
    if (silentMode) return;
    try { pingSound.currentTime = 0; pingSound.play(); } catch {}
  }

  function toggleSilent() {
    silentMode = !silentMode;
    const toggle = document.getElementById("silentToggle");
    const label = document.getElementById("silentLabel");
    if (silentMode) {
      toggle.classList.add("silent");
      label.textContent = "Silent";
    } else {
      toggle.classList.remove("silent");
      label.textContent = "Sound On";
    }
  }

  function setError(msg) {
    document.getElementById("loginError").textContent = msg || "";
  }

  async function signup() {
    setError("");
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value.trim();
    if (!u || !p) return setError("Enter username and password.");
    try {
      const res = await fetch(backend + "/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: u, password: p })
      });
      const data = await res.json();
      if (data.error) return setError(data.error);
      setError("Account created. Now log in.");
    } catch {
      setError("Signup failed.");
    }
  }

  async function login() {
    setError("");
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value.trim();
    if (!u || !p) return setError("Enter username and password.");
    try {
      const res = await fetch(backend + "/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: u, password: p })
      });
      const data = await res.json();
      if (data.error) return setError(data.error);
      userId = data.userId;
      username = u;
      document.getElementById("userBadge").textContent = username;
      document.getElementById("loginView").style.display = "none";
      document.getElementById("chatView").style.display = "block";
      initSocket();
      loadConversations();
    } catch {
      setError("Login failed.");
    }
  }

  function initSocket() {
    socket = io(backend);
    socket.on("message", msg => handleIncoming(msg));
    socket.on("file", msg => handleIncoming(msg));
  }

  function handleIncoming(msg) {
    const isCurrent = msg.conversationId === currentConvo;
    const isMe = msg.senderId === userId;
    if (isCurrent) {
      addMessage(msg, true);
    } else if (!isMe) {
      unreadMap[msg.conversationId] = true;
      loadConversations();
      playPing();
    }
  }

  async function loadConversations() {
    if (!userId) return;
    try {
      const res = await fetch(backend + "/conversations?userId=" + encodeURIComponent(userId));
      const convos = await res.json();
      const list = document.getElementById("convoList");
      list.innerHTML = "";
      convos.forEach(c => {
        const div = document.createElement("div");
        div.className = "convoItem" + (c.id === currentConvo ? " active" : "");
        if (unreadMap[c.id]) div.classList.add("unread");

        const textWrap = document.createElement("div");
        textWrap.className = "convoText";

        const title = document.createElement("div");
        title.className = "convoTitle";
        title.textContent = c.type === "dm" ? (c.otherName || "DM") : (c.name || "Group");

        const meta = document.createElement("div");
        meta.className = "convoMeta";
        meta.textContent = c.type === "dm" ? "Direct message" : "Group chat";

        textWrap.appendChild(title);
        textWrap.appendChild(meta);

        const dot = document.createElement("div");
        dot.className = "unreadDot";

        div.appendChild(textWrap);
        div.appendChild(dot);

        div.onclick = () => openConversation(c.id, title.textContent, meta.textContent);
        list.appendChild(div);
      });
    } catch (e) {
      console.error(e);
    }
  }

  async function openConversation(id, title, subtitle) {
    currentConvo = id;
    unreadMap[id] = false;

    const list = document.getElementById("convoList").children;
    Array.from(list).forEach(el => {
      el.classList.remove("active");
      el.classList.remove("unread");
      const t = el.querySelector(".convoTitle")?.textContent;
      const m = el.querySelector(".convoMeta")?.textContent;
      if (t === title && m === subtitle) el.classList.add("active");
    });

    document.getElementById("chatTitle").textContent = title;
    document.getElementById("chatSubtitle").textContent = subtitle;
    socket.emit("join", id);

    try {
      const res = await fetch(backend + "/messages?conversationId=" + encodeURIComponent(id));
      const msgs = await res.json();
      const box = document.getElementById("messages");
      box.innerHTML = "";
      msgs.forEach(m => addMessage(m, false));
      box.scrollTop = box.scrollHeight;
    } catch (e) {
      console.error(e);
    }
  }

  function addMessage(msg, fromSocket) {
    const row = document.createElement("div");
    const isMe = msg.senderId === userId;
    row.className = "bubbleRow " + (isMe ? "meRow" : "themRow");

    const bubble = document.createElement("div");
    bubble.className = "bubble " + (isMe ? "meBubble" : "themBubble");

    if (msg.content) {
      const text = document.createElement("div");
      text.textContent = msg.content;
      bubble.appendChild(text);
    }

    if (msg.fileUrl) {
      const link = document.createElement("a");
      link.href = msg.fileUrl;
      link.target = "_blank";
      link.className = "fileLink";
      link.textContent = msg.fileName || "File";
      bubble.appendChild(link);

      if (/\.(png|jpg|jpeg|gif|webp)$/i.test(msg.fileName || "")) {
        const img = document.createElement("img");
        img.src = msg.fileUrl;
        img.className = "imagePreview";
        bubble.appendChild(img);
      }
    }

    const meta = document.createElement("div");
    meta.className = "bubbleMeta";
    meta.textContent = isMe ? "You" : (msg.senderName || "Them");
    bubble.appendChild(meta);

    row.appendChild(bubble);
    const box = document.getElementById("messages");
    box.appendChild(row);
    box.scrollTop = box.scrollHeight;

    if (fromSocket && !isMe) playPing();
  }

  function onFileChange(e) {
    const file = e.target.files[0];
    selectedFile = file || null;
    document.getElementById("fileNameDisplay").textContent =
      file ? ("Selected: " + file.name) : "No file selected";
  }

  async function sendMessage() {
    if (!currentConvo) return;
    const text = document.getElementById("msgInput").value.trim();
    const hasFile = !!selectedFile;
    if (!text && !hasFile) return;

    document.getElementById("sendBtn").disabled = true;

    try {
      if (hasFile) {
        const form = new FormData();
        form.append("file", selectedFile);
        form.append("conversationId", currentConvo);
        form.append("senderId", userId);
        form.append("senderName", username);
        form.append("content", text);

        await fetch(backend + "/upload", {
          method: "POST",
          body: form
        });
        selectedFile = null;
        document.getElementById("fileInput").value = "";
        document.getElementById("fileNameDisplay").textContent = "No file selected";
        document.getElementById("msgInput").value = "";
      } else {
        const msg = {
          id: Date.now(),
          conversationId: currentConvo,
          senderId: userId,
          senderName: username,
          content: text
        };
        socket.emit("message", msg);
        addMessage(msg, false);
        document.getElementById("msgInput").value = "";
      }
    } catch (e) {
      console.error(e);
    } finally {
      document.getElementById("sendBtn").disabled = false;
    }
  }

  async function promptDM() {
    const other = prompt("Enter username to DM:");
    if (!other) return;
    try {
      const res = await fetch(backend + "/dm", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user1: userId, otherUsername: other })
      });
      const data = await res.json();
      if (data.error) return alert(data.error);
      await loadConversations();
    } catch (e) {
      console.error(e);
    }
  }

  async function promptGroup() {
    const name = prompt("Group name:");
    if (!name) return;
    const membersStr = prompt("Usernames to add (comma separated):");
    if (!membersStr) return;
    const members = membersStr.split(",").map(s => s.trim()).filter(Boolean);
    try {
      const res = await fetch(backend + "/group", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, ownerId: userId, memberUsernames: members })
      });
      const data = await res.json();
      if (data.error) return alert(data.error);
      await loadConversations();
    } catch (e) {
      console.error(e);
    }
  }

  async function deleteConversation() {
    if (!currentConvo) return;
    const ok = confirm("Delete this conversation and all its messages?");
    if (!ok) return;
    try {
      await fetch(backend + "/conversation/" + encodeURIComponent(currentConvo), {
        method: "DELETE"
      });
      currentConvo = null;
      document.getElementById("chatTitle").textContent = "No conversation";
      document.getElementById("chatSubtitle").textContent = "Select or create a chat";
      document.getElementById("messages").innerHTML = "";
      await loadConversations();
    } catch (e) {
      console.error(e);
    }
  }

  async function wakeBackend() {
    const loadingText = document.getElementById("loadingText");
    try {
      loadingText.textContent = "Waking backend…";
      await fetch(backend + "/ping", { cache: "no-store" });
      loadingText.textContent = "Backend ready";
      setTimeout(() => {
        document.getElementById("loadingScreen").style.opacity = "0";
        setTimeout(() => {
          document.getElementById("loadingScreen").style.display = "none";
          document.getElementById("appWrapper").style.display = "block";
        }, 600);
      }, 300);
    } catch (e) {
      loadingText.textContent = "Retrying backend…";
      setTimeout(wakeBackend, 1500);
    }
  }

  wakeBackend();
</script>
</body>
</html>
