<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Messages</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    :root { color-scheme: dark; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: #0b0c10;
      color: #f2f3f5;
      overscroll-behavior: none;
    }

    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* APP WRAPPER */
    #appWrapper {
      height: 100vh;
      width: 100%;
      background: #0b0c10;
    }

    /* LOGIN VIEW */
    #loginView, #chatView {
      height: 100%;
      width: 100%;
    }

    #loginView {
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #202225 0, #05060a 60%);
    }

    #loginCard {
      background: #18191c;
      border-radius: 16px;
      padding: 24px 22px 20px;
      width: 320px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.7);
      border: 1px solid #202225;
    }

    #loginCard h1 {
      margin: 0 0 4px;
      font-size: 22px;
      font-weight: 600;
    }

    #loginCard p {
      margin: 0 0 18px;
      font-size: 13px;
      color: #b9bbbe;
    }

    .fieldLabel {
      font-size: 12px;
      color: #b9bbbe;
      margin-bottom: 4px;
    }

    .fieldInput {
      width: 100%;
      padding: 9px 10px;
      border-radius: 6px;
      border: 1px solid #202225;
      background: #202225;
      color: #f2f3f5;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .fieldInput:focus {
      outline: none;
      border-color: #5865f2;
      box-shadow: 0 0 0 1px #5865f255;
    }

    .btnRow {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .btn {
      flex: 1;
      border-radius: 4px;
      border: none;
      padding: 8px 0;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
      transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.12s ease;
    }

    .btnPrimary {
      background: #5865f2;
      color: #fff;
      box-shadow: 0 8px 18px rgba(88,101,242,0.45);
    }

    .btnPrimary:active {
      transform: scale(0.97);
      box-shadow: 0 4px 10px rgba(88,101,242,0.4);
    }

    .btnSecondary {
      background: #2b2d31;
      color: #fff;
    }

    .btnSecondary:active {
      transform: scale(0.97);
    }

    .errorText {
      color: #f04747;
      font-size: 12px;
      margin-top: 6px;
      min-height: 14px;
    }

    /* CHAT LAYOUT (DISCORD STYLE) */
    #chatView {
      display: none;
    }

    #chatShell {
      display: flex;
      height: 100%;
      width: 100%;
      background: #0b0c10;
    }

    /* LEFT: CONVERSATION BAR (SERVER BAR STYLE) */
    #convoBar {
      width: 72px;
      background: #1e1f22;
      padding: 10px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      border-right: 1px solid #202225;
    }

    .convoIcon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #313338;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f2f3f5;
      font-size: 20px;
      cursor: pointer;
      position: relative;
      transition: border-radius 0.15s ease, background 0.15s ease, transform 0.08s ease;
    }

    .convoIcon span {
      font-size: 18px;
      font-weight: 600;
    }

    .convoIcon:hover {
      border-radius: 16px;
      background: #5865f2;
    }

    .convoIcon.active {
      border-radius: 16px;
      background: #5865f2;
    }

    .convoUnreadDot {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f04747;
      border: 2px solid #1e1f22;
      display: none;
    }

    .convoIcon.unread .convoUnreadDot {
      display: block;
    }

    #addConvoBtn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #313338;
      color: #23a559;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      cursor: pointer;
      margin-top: 4px;
    }

    #addConvoBtn:hover {
      background: #23a559;
      color: #fff;
    }

    #convoIcons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }

    /* MIDDLE: INFO PANEL */
    #infoPanel {
      width: 220px;
      background: #2b2d31;
      border-right: 1px solid #202225;
      display: flex;
      flex-direction: column;
    }

    #infoHeader {
      padding: 10px 12px;
      border-bottom: 1px solid #202225;
    }

    #infoTitle {
      font-size: 14px;
      font-weight: 600;
    }

    #infoSubtitle {
      font-size: 12px;
      color: #b9bbbe;
      margin-top: 2px;
    }

    #infoBody {
      flex: 1;
      padding: 10px 12px;
      font-size: 12px;
      color: #b9bbbe;
      overflow-y: auto;
    }

    #infoBody h4 {
      margin: 8px 0 4px;
      font-size: 12px;
      color: #f2f3f5;
    }

    #infoBody ul {
      list-style: none;
      padding-left: 0;
      margin: 0 0 8px;
    }

    #infoBody li {
      margin-bottom: 2px;
    }

    /* RIGHT: MAIN CHAT */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #313338;
    }

    #chatHeader {
      height: 48px;
      padding: 0 12px;
      border-bottom: 1px solid #202225;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #313338;
    }

    #chatHeaderLeft {
      display: flex;
      flex-direction: column;
    }

    #chatTitle {
      font-size: 16px;
      font-weight: 600;
    }

    #chatSubtitle {
      font-size: 12px;
      color: #b9bbbe;
    }

    #chatHeaderRight {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #userBadge {
      font-size: 12px;
      color: #b9bbbe;
      padding: 3px 8px;
      border-radius: 999px;
      background: #2b2d31;
    }

    #silentToggle {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #b9bbbe;
      padding: 3px 8px;
      border-radius: 999px;
      background: #2b2d31;
      cursor: pointer;
    }

    #silentDot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #23a559;
    }

    #silentToggle.silent #silentDot {
      background: #f04747;
    }

    #deleteBtn {
      width: 26px;
      height: 26px;
      border-radius: 4px;
      border: none;
      background: #2b2d31;
      color: #f04747;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
    }

    /* MESSAGES (DISCORD STYLE, NO BUBBLES) */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .msgRow {
      display: flex;
      gap: 10px;
      animation: msgIn 0.15s ease-out;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msgAvatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #2b2d31;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #f2f3f5;
      flex-shrink: 0;
    }

    .msgBody {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }

    .msgHeader {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 2px;
    }

    .msgAuthor {
      font-size: 13px;
      font-weight: 600;
      color: #f2f3f5;
    }

    .msgMeta {
      font-size: 11px;
      color: #72767d;
    }

    .msgContent {
      font-size: 14px;
      color: #dcddde;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .fileLink {
      color: #00aff4;
      text-decoration: underline;
      cursor: pointer;
      font-size: 13px;
      display: inline-block;
      margin-top: 4px;
    }

    .imagePreview {
      max-width: 220px;
      max-height: 220px;
      border-radius: 8px;
      margin-top: 4px;
      display: block;
    }

    /* COMPOSER */
    #composer {
      border-top: 1px solid #202225;
      padding: 10px 14px;
      background: #313338;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #composerTop {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #b9bbbe;
    }

    #fileInput { display: none; }

    #fileLabel {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      background: #2b2d31;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      color: #f2f3f5;
    }

    #fileNameDisplay {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #composerBottom {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #msgInput {
      flex: 1;
      border-radius: 8px;
      border: none;
      padding: 9px 10px;
      font-size: 14px;
      background: #383a40;
      color: #f2f3f5;
    }

    #msgInput:focus {
      outline: none;
    }

    #sendBtn {
      border-radius: 4px;
      border: none;
      padding: 8px 14px;
      font-size: 14px;
      background: #5865f2;
      color: #fff;
      cursor: pointer;
      font-weight: 500;
      box-shadow: 0 6px 14px rgba(88,101,242,0.45);
    }

    #sendBtn:disabled {
      opacity: 0.5;
      cursor: default;
      box-shadow: none;
    }

    @media (max-width: 900px) {
      #infoPanel { display: none; }
    }

    @media (max-width: 700px) {
      #convoBar { width: 60px; }
      #infoPanel { display: none; }
      #chatHeader { padding: 0 8px; }
      #messages { padding: 10px 10px; }
    }
  </style>
</head>
<body>

<div id="appWrapper">
  <!-- LOGIN -->
  <div id="loginView">
    <div id="loginCard">
      <h1>Sign in</h1>
      <p>Log in or sign up to start chatting.</p>

      <div class="fieldLabel">Username</div>
      <input id="username" class="fieldInput" placeholder="e.g. nix">

      <div class="fieldLabel">Password</div>
      <input id="password" class="fieldInput" type="password" placeholder="••••••••">

      <div class="btnRow">
        <button class="btn btnSecondary" onclick="signup()">Sign Up</button>
        <button class="btn btnPrimary" onclick="login()">Log In</button>
      </div>

      <div id="loginError" class="errorText"></div>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chatView">
    <div id="chatShell">
      <!-- LEFT: CONVO BAR -->
      <div id="convoBar">
        <div id="addConvoBtn" title="New conversation" onclick="promptNewConvo()">+</div>
        <div id="convoIcons"></div>
      </div>

      <!-- MIDDLE: INFO PANEL -->
      <div id="infoPanel">
        <div id="infoHeader">
          <div id="infoTitle">No conversation</div>
          <div id="infoSubtitle">Select or create one</div>
        </div>
        <div id="infoBody">
          <h4>Members</h4>
          <ul id="infoMembers">
            <li>—</li>
          </ul>
          <h4>Recent files</h4>
          <ul id="infoFiles">
            <li>—</li>
          </ul>
        </div>
      </div>

      <!-- RIGHT: MAIN CHAT -->
      <div id="main">
        <div id="chatHeader">
          <div id="chatHeaderLeft">
            <div id="chatTitle">No conversation</div>
            <div id="chatSubtitle">Select or create a chat</div>
          </div>
          <div id="chatHeaderRight">
            <div id="silentToggle" onclick="toggleSilent()">
              <div id="silentDot"></div>
              <span id="silentLabel">Sound On</span>
            </div>
            <div id="userBadge"></div>
            <button id="deleteBtn" onclick="deleteConversation()" title="Delete conversation">🗑</button>
          </div>
        </div>

        <div id="messages"></div>

        <div id="composer">
          <div id="composerTop">
            <label id="fileLabel" for="fileInput">+</label>
            <input id="fileInput" type="file" onchange="onFileChange(event)">
            <div id="fileNameDisplay">No file selected</div>
          </div>
          <div id="composerBottom">
            <input id="msgInput" placeholder="Message" onkeydown="if(event.key==='Enter'){event.preventDefault();sendMessage();}">
            <button id="sendBtn" onclick="sendMessage()">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<audio id="pingSound">
  <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAIlYAAESsAAACABAAZGF0YQAAAAAA" type="audio/wav">
</audio>

<script>
  const backend = "https://messages-use.onrender.com"; // or your Railway URL

  let socket = null;
  let userId = null;
  let username = null;
  let currentConvo = null;
  let selectedFile = null;
  let silentMode = false;
  const unreadMap = {};
  const pingSound = document.getElementById("pingSound");

function playPing() {
  try {
    pingSound.currentTime = 0;
    pingSound.play();
  } catch (e) {}
}


  function playPing() {
    if (silentMode) return;
    try { pingSound.currentTime = 0; pingSound.play(); } catch {}
  }

  function toggleSilent() {
    silentMode = !silentMode;
    const toggle = document.getElementById("silentToggle");
    const label = document.getElementById("silentLabel");
    if (silentMode) {
      toggle.classList.add("silent");
      label.textContent = "Silent";
    } else {
      toggle.classList.remove("silent");
      label.textContent = "Sound On";
    }
  }

  function setError(msg) {
    document.getElementById("loginError").textContent = msg || "";
  }

  async function signup() {
    setError("");
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value.trim();
    if (!u || !p) return setError("Enter username and password.");
    try {
      const res = await fetch(backend + "/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: u, password: p })
      });
      const data = await res.json();
      if (data.error) return setError(data.error);
      setError("Account created. Now log in.");
    } catch {
      setError("Signup failed.");
    }
  }

  async function login() {
    setError("");
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value.trim();
    if (!u || !p) return setError("Enter username and password.");
    try {
      const res = await fetch(backend + "/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: u, password: p })
      });
      const data = await res.json();
      if (data.error) return setError(data.error);
      userId = data.userId;
      username = u;
      document.getElementById("userBadge").textContent = username;
      document.getElementById("loginView").style.display = "none";
      document.getElementById("chatView").style.display = "block";
      initSocket();
      loadConversations();
    } catch {
      setError("Login failed.");
    }
  }

  function initSocket() {
    socket = io(backend);
    socket.on("message", msg => handleIncoming(msg));
    socket.on("file", msg => handleIncoming(msg));
  }

  function handleIncoming(msg) {
    const isCurrent = msg.conversationId === currentConvo;
    const isMe = msg.senderId === userId;
    if (isCurrent) {
      addMessage(msg);
    } else if (!isMe) {
      unreadMap[msg.conversationId] = true;
      renderConvoIcons();
      playPing();
    }
  }

  async function loadConversations() {
    if (!userId) return;
    try {
      const res = await fetch(backend + "/conversations?userId=" + encodeURIComponent(userId));
      const convos = await res.json();
      window._convos = convos;
      renderConvoIcons();
    } catch (e) {
      console.error(e);
    }
  }

  function renderConvoIcons() {
    const wrap = document.getElementById("convoIcons");
    wrap.innerHTML = "";
    const convos = window._convos || [];
    convos.forEach(c => {
      const div = document.createElement("div");
      div.className = "convoIcon";
      if (c.id === currentConvo) div.classList.add("active");
      if (unreadMap[c.id]) div.classList.add("unread");

      const span = document.createElement("span");
      const label = c.type === "dm" ? (c.otherName || "DM") : (c.name || "G");
      span.textContent = label[0]?.toUpperCase() || "?";

      const dot = document.createElement("div");
      dot.className = "convoUnreadDot";

      div.appendChild(span);
      div.appendChild(dot);

      div.title = label;
      div.onclick = () => openConversation(c.id, label, c.type);

      wrap.appendChild(div);
    });
  }

  async function openConversation(id, label, type) {
    currentConvo = id;
    unreadMap[id] = false;

    const icons = document.querySelectorAll(".convoIcon");
    icons.forEach(icon => {
      icon.classList.remove("active", "unread");
      if (icon.title === label) icon.classList.add("active");
    });

    document.getElementById("chatTitle").textContent = label;
    document.getElementById("chatSubtitle").textContent = type === "dm" ? "Direct message" : "Group chat";

    const infoTitle = document.getElementById("infoTitle");
    const infoSubtitle = document.getElementById("infoSubtitle");
    infoTitle.textContent = label;
    infoSubtitle.textContent = type === "dm" ? "Direct message" : "Group chat";

    socket.emit("join", id);

    try {
      const res = await fetch(backend + "/messages?conversationId=" + encodeURIComponent(id));
      const msgs = await res.json();
      const box = document.getElementById("messages");
      box.innerHTML = "";
      msgs.forEach(m => addMessage(m));
      box.scrollTop = box.scrollHeight;
    } catch (e) {
      console.error(e);
    }

    loadInfoPanel(id);
  }

  async function loadInfoPanel(convoId) {
    try {
      const res = await fetch(backend + "/conversationInfo?conversationId=" + encodeURIComponent(convoId));
      const info = await res.json();
      const membersUl = document.getElementById("infoMembers");
      const filesUl = document.getElementById("infoFiles");
      membersUl.innerHTML = "";
      filesUl.innerHTML = "";

      if (info.members && info.members.length) {
        info.members.forEach(m => {
          const li = document.createElement("li");
          li.textContent = m;
          membersUl.appendChild(li);
        });
      } else {
        const li = document.createElement("li");
        li.textContent = "—";
        membersUl.appendChild(li);
      }

      if (info.files && info.files.length) {
        info.files.forEach(f => {
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.href = f.url;
          a.textContent = f.name;
          a.style.color = "#00aff4";
          a.className = "fileLink";
          a.download = f.name || "file";
          li.appendChild(a);
          filesUl.appendChild(li);
        });
      } else {
        const li = document.createElement("li");
        li.textContent = "—";
        filesUl.appendChild(li);
      }
    } catch (e) {
      console.error(e);
    }
  }

  function addMessage(msg) {
    const box = document.getElementById("messages");
    const row = document.createElement("div");
    row.className = "msgRow";

    const avatar = document.createElement("div");
    avatar.className = "msgAvatar";
    const initial = (msg.senderName || "U")[0]?.toUpperCase() || "U";
    avatar.textContent = initial;

    const body = document.createElement("div");
    body.className = "msgBody";

    const header = document.createElement("div");
    header.className = "msgHeader";

    const author = document.createElement("div");
    author.className = "msgAuthor";
    author.textContent = msg.senderId === userId ? username : (msg.senderName || "User");

    const meta = document.createElement("div");
    meta.className = "msgMeta";
    meta.textContent = msg.time || "";

    header.appendChild(author);
    header.appendChild(meta);

    const content = document.createElement("div");
    content.className = "msgContent";
    content.textContent = msg.content || "";

    body.appendChild(header);
    if (msg.content) body.appendChild(content);

    if (msg.fileUrl) {
      const link = document.createElement("a");
      link.href = msg.fileUrl;
      link.className = "fileLink";
      link.textContent = msg.fileName || "File";
      link.download = msg.fileName || "file";
      body.appendChild(link);

      if (/\.(png|jpg|jpeg|gif|webp)$/i.test(msg.fileName || "")) {
        const img = document.createElement("img");
        img.src = msg.fileUrl;
        img.className = "imagePreview";
        body.appendChild(img);
      }
    }

    row.appendChild(avatar);
    row.appendChild(body);
    box.appendChild(row);
    box.scrollTop = box.scrollHeight;

    if (msg.senderId !== userId) playPing();
  }

  function onFileChange(e) {
    const file = e.target.files[0];
    selectedFile = file || null;
    document.getElementById("fileNameDisplay").textContent =
      file ? ("Selected: " + file.name) : "No file selected";
  }

  async function sendMessage() {
    if (!currentConvo) return;
    const text = document.getElementById("msgInput").value.trim();
    const hasFile = !!selectedFile;
    if (!text && !hasFile) return;

    document.getElementById("sendBtn").disabled = true;

    try {
      if (hasFile) {
        const form = new FormData();
        form.append("file", selectedFile);
        form.append("conversationId", currentConvo);
        form.append("senderId", userId);
        form.append("senderName", username);
        form.append("content", text);

        await fetch(backend + "/upload", {
          method: "POST",
          body: form
        });

        selectedFile = null;
        document.getElementById("fileInput").value = "";
        document.getElementById("fileNameDisplay").textContent = "No file selected";
        document.getElementById("msgInput").value = "";
      } else {
        const msg = {
          conversationId: currentConvo,
          senderId: userId,
          senderName: username,
          content: text
        };
        // no local addMessage here; wait for backend echo to avoid double send
        socket.emit("message", msg);
        document.getElementById("msgInput").value = "";
      }
    } catch (e) {
      console.error(e);
    } finally {
      document.getElementById("sendBtn").disabled = false;
    }
  }

  async function promptNewConvo() {
    const type = prompt("Type 'dm' for direct message or 'group' for group chat:");
    if (!type) return;
    if (type.toLowerCase() === "dm") {
      const other = prompt("Enter username to DM:");
      if (!other) return;
      try {
        const res = await fetch(backend + "/dm", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user1: userId, otherUsername: other })
        });
        const data = await res.json();
        if (data.error) return alert(data.error);
        await loadConversations();
      } catch (e) {
        console.error(e);
      }
    } else if (type.toLowerCase() === "group") {
      const name = prompt("Group name:");
      if (!name) return;
      const membersStr = prompt("Usernames to add (comma separated):");
      if (!membersStr) return;
      const members = membersStr.split(",").map(s => s.trim()).filter(Boolean);
      try {
        const res = await fetch(backend + "/group", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, ownerId: userId, memberUsernames: members })
        });
        const data = await res.json();
        if (data.error) return alert(data.error);
        await loadConversations();
      } catch (e) {
        console.error(e);
      }
    } else {
      alert("Invalid type.");
    }
  }

  async function deleteConversation() {
    if (!currentConvo) return;
    const ok = confirm("Delete this conversation and all its messages?");
    if (!ok) return;
    try {
      await fetch(backend + "/conversation/" + encodeURIComponent(currentConvo), {
        method: "DELETE"
      });
      currentConvo = null;
      document.getElementById("chatTitle").textContent = "No conversation";
      document.getElementById("chatSubtitle").textContent = "Select or create a chat";
      document.getElementById("messages").innerHTML = "";
      document.getElementById("infoTitle").textContent = "No conversation";
      document.getElementById("infoSubtitle").textContent = "Select or create one";
      document.getElementById("infoMembers").innerHTML = "<li>—</li>";
      document.getElementById("infoFiles").innerHTML = "<li>—</li>";
      await loadConversations();
    } catch (e) {
      console.error(e);
    }
  }
</script>
